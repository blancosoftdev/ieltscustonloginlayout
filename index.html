<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Test & Score</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://ielts.testandscore.com/images/Logo.svg"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      data-preload="true"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      data-preload="true"
    />

    <style>
      @font-face {
        font-family: "LoewNextBold";
        src: url("https://blancosoftdev.github.io/ieltscustonloginlayout/fonts/LoewNext-Bold-BF63fd638abb9de.otf")
          format("opentype");
      }

      @font-face {
        font-family: "LoewNextMeduim";
        src: url("https://blancosoftdev.github.io/ieltscustonloginlayout/fonts/LoewNext-Medium-BF63fd638a9ff86.otf")
          format("opentype");
      }

      :root {
        --primary: #326ce2;
        --primary-light: #e4effb;
        --primary-dark: #0d3059;
        --white: #fff;
        --black: #000;
        --text-medium: #535353;
        --text-light: #d5d5d5;
        --secondary: #027d08;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        height: 100%;
        min-height: 100vh;
        background:
          linear-gradient(rgba(7, 35, 68, 0.85), rgba(1, 13, 27, 0.85)),
          url("https://images.unsplash.com/photo-1673515324889-812ebdd8b434?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D")
            center/cover no-repeat;
      }

      /* Main Card - Compact */
      .login-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 28px 32px;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 10px 40px -10px rgba(0, 0, 0, 0.15),
          0 4px 12px rgba(0, 0, 0, 0.05);
        position: relative;
        overflow: hidden;
      }

      /* Subtle gradient accent at top */
      .login-card::before {
        content: "";
        position: absolute;
        top: 0px;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
      }

      /* Logo - Smaller */
      .logo-section {
        text-align: center;
        margin-bottom: 20px;
      }

      .logo-section img {
        height: 40px;
        width: auto;
        transition: transform 0.3s ease;
      }

      .logo-section:hover img {
        transform: scale(1.05);
      }

      /* API Content Styling - Compact */
      #api .heading h1 {
        font-family: "LoewNextBold", "Inter", sans-serif;
        font-size: 32px;
        color: var(--primary-dark);
        text-align: center;
        margin-bottom: 16px;
        font-weight: 800;
        line-height: 1.5;
      }

      #api .intro h2 {
        display: none;
      }

      /* Social Button - Compact */
      .claims-provider-list-buttons.social {
        margin-bottom: 16px;
      }

      #GoogleExchange {
        width: 100%;
        padding: 12px 20px;
        background: #ffffff;
        border: 1.5px solid #e5e7eb !important;
        border-radius: 10px;
        color: var(--black);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: "Inter", sans-serif;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      #GoogleExchange:hover {
        border-color: var(--primary) !important;
        background: var(--primary-light);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(50, 108, 226, 0.15);
      }
      #GoogleExchange:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 1px rgba(50, 108, 226, 0.2);
      }
      /* Add Google logo before text */
      #GoogleExchange::before {
        content: "";
        width: 18px;
        height: 18px;
        background-image: url("https://blancosoftdev.github.io/ieltscustonloginlayout/images/google-exchange.png");
        background-size: contain;
        background-repeat: no-repeat;
        display: inline-block;
      }
      /* Divider - Compact */
      #api .divider {
        display: flex;
        align-items: center;
        margin: 16px 0;
        color: var(--text-light);
      }

      #api .divider::before,
      #api .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--text-light),
          transparent
        );
      }

      #api .divider h2 {
        padding: 0 12px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-medium);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Hide duplicate intro heading inside form */
      #api form .intro {
        display: none;
      }
      #api .intro {
        display: none;
      }
      #api ul {
        padding-left: 0;
        list-style: none;
      }
      /* Form Inputs - Compact */
      #api .entry-item {
        margin-bottom: 14px;
      }

      #api .entry-item label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 6px;
      }
      #api .localAccount .divider {
        display: none;
      }
      #api input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        color: var(--black);
        background: #fafafa;
        transition: all 0.2s ease;
        font-family: "Inter", sans-serif;
        height: 44px;
      }

      #api input:focus {
        outline: none;
        border-color: var(--primary);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(50, 108, 226, 0.1);
      }

      #api input::placeholder {
        color: #9ca3af;
      }

      /* Password Row */
      #api .password-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      #api #forgotPassword {
        font-size: 12px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      #api #forgotPassword:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
      #api .helpLink.tiny {
        display: none;
      }
      #api .buttons button {
        font-size: 14px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        color: var(--primary);
        margin-top: 6px;
        transition: all 0.25s ease;
        width: 100%;
      }

      #api .buttons button:hover {
        background: var(--primary-light);
        border-color: var(--primary);
      }

      #api button#continue {
        width: 100%;
        height: 38px;
        background: var(--primary);
        color: #fff;
        border: none;
        font-size: 15px;
        font-weight: 600;
        margin-top: 10px;
        transition: all 0.25s ease;
        box-shadow: 0 4px 6px -1px rgba(50, 108, 226, 0.25);
      }

      #api button#continue:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 8px 16px -4px rgba(50, 108, 226, 0.3);
      }
      /* Submit Button - Compact */
      #api button#next {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 4px;
        font-family: "Inter", sans-serif;
        box-shadow: 0 4px 6px -1px rgba(50, 108, 226, 0.2);
        height: 44px;
      }

      #api button#next:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 8px 16px -4px rgba(50, 108, 226, 0.3);
      }

      /* Create Account - Compact */
      #api .create {
        text-align: center;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #f3f4f6;
      }

      #api .create p {
        font-size: 13px;
        color: var(--text-medium);
        margin: 0;
      }

      #api #createAccount {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        margin-left: 4px;
        transition: color 0.2s;
      }

      #api #createAccount:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      /* Error States */
      #api .error {
        color: #dc2626;
        font-size: 12px;
        margin-top: 4px;
        font-weight: 500;
      }

      #api input.error {
        border-color: #dc2626;
        background: #fef2f2;
      }

      /* Working indicator */
      #api .working {
        display: none;
      }

      /* Responsive - Allow scroll on mobile */
      @media (max-width: 480px) {
        body {
          padding: 12px;
          padding-top: 20px;
        }

        .login-card {
          padding: 24px 20px;
        }

        #api .heading h1 {
          font-size: 22px;
        }
      }

      /* Smooth entry animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        animation: fadeIn 0.5s ease-out;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <div class="logo-section">
        <a href="https://testandscore.com">
          <img
            src="https://ielts.testandscore.com/images/Logo.svg"
            alt="Test & Score"
          />
        </a>
      </div>

      <div id="api"></div>
    </div>
  </body>
</html>
