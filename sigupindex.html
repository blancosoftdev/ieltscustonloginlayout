<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Test & Score | Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://ielts.testandscore.com/images/Logo.svg"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #326ce2;
        --primary-light: #e4effb;
        --primary-dark: #0d3059;
        --white: #fff;
        --black: #000;
        --text-medium: #535353;
        --text-light: #d5d5d5;
        --secondary: #027d08;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 8px;
        background:
          linear-gradient(rgba(7, 35, 68, 0.85), rgba(1, 13, 27, 0.85)),
          url("https://images.unsplash.com/photo-1673515324889-812ebdd8b434?auto=format&fit=crop&w=2000&q=80")
            center/cover no-repeat;
      }

      /* ===== CARD ===== */
      .login-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 32px;
        width: 100%;
        max-width: 440px;
        box-shadow:
          0 10px 40px -10px rgba(0, 0, 0, 0.15),
          0 4px 12px rgba(0, 0, 0, 0.05);
        position: relative;
        animation: fadeIn 0.5s ease;
        overflow: hidden;
      }

      .login-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        border-radius: 20px 20px 0 0;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-section {
        text-align: center;
        margin-bottom: 20px;
      }
      .logo-section img {
        height: 40px;
        transition: transform 0.3s ease;
      }
      .logo-section:hover img {
        transform: scale(1.05);
      }

      /* ===== AZURE FORM ENHANCED STYLING ===== */
      #api .heading h1 {
        font-size: 24px;
        color: var(--primary-dark);
        text-align: center;
        margin-bottom: 0px;
        font-weight: 800;
      }

      #api .intro {
        display: none;
      }
      #api .helpLink.tiny {
        display: none;
      }
      #api ul {
        list-style: none;
        padding: 0;
      }
      #api li {
        margin-bottom: 16px;
      }

      #api label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 6px;
      }

      #api input.textInput {
        width: 100%;
        height: 44px;
        padding: 12px 16px;
        border: 1.8px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        background: #fafafa;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        transition: all 0.25s ease;
      }

      #api input.textInput:focus {
        outline: none;
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(50, 108, 226, 0.15);
      }

      #api .buttons button {
        font-size: 14px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        color: var(--primary);
        margin-top: 6px;
        transition: all 0.25s ease;
        width: 100%;
      }

      #api .buttons button:hover {
        background: var(--primary-light);
        border-color: var(--primary);
      }

      #api button#continue {
        width: 100%;
        height: 38px;
        background: var(--primary);
        color: #fff;
        border: none;
        font-size: 15px;
        font-weight: 600;
        margin-top: 10px;
        transition: all 0.25s ease;
        box-shadow: 0 4px 6px -1px rgba(50, 108, 226, 0.25);
      }

      #api button#continue:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 8px 16px -4px rgba(50, 108, 226, 0.3);
      }

      #api .error {
        font-size: 12px;
        color: #dc2626;
        margin-top: 4px;
      }

      /* ===== TERMS SECTION ===== */
      .terms {
        margin-top: 14px;
        padding-top: 6px;
        border-top: 1px solid #f3f4f6;
        font-size: 12.5px;
        color: var(--text-medium);
        text-align: center;
        line-height: 1.6;
      }

      .terms a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .terms a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 24px 20px;
        }
      }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-16875708127"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-16875708127');
</script>
  </head>

  <body>
    <div class="login-card">
      <div class="logo-section">
        <a href="https://testandscore.com">
          <img
            src="https://ielts.testandscore.com/images/Logo.svg"
            alt="Test & Score"
          />
        </a>
      </div>

      <div id="api"></div>

      <!-- Terms inside card -->
      <div class="terms">
        By signing up, you acknowledge that you have read and understood, and
        agree to Test & Score’s
        <a href="https://testandscore.com/terms-conditions" target="_blank"
          >Terms</a
        >
        and
        <a href="https://testandscore.com/privacy" target="_blank"
          >Privacy Policy</a
        >.
      </div>
    </div>
  </body>
</html>
